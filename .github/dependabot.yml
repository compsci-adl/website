version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
    schedule:
      interval: daily
      time: "06:00"
      timezone: "Australia/Adelaide"

    # Restrict version update PRs to major updates only.
    # Security updates are still allowed.
    allow:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

    # Wait 14 days before proposing any GitHub Actions version update.
    cooldown:
      default-days: 14

    # Group major action bumps into one PR to reduce clutter.
    groups:
      github-actions-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - major
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
