services:
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.6.1@sha256:dea26401d06341095cc4ea9d66896200b55de5ca1daa1d2fcbe58493afa6e0ad
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:8080']
    environment:
      - DB_VENDOR=h2
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    ports:
      - 8080:8080
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json:ro
    command: ['start-dev', '--import-realm']
    networks:
      - csclub
  redis:
    image: redis:latest@sha256:0c341492924cad6f5483f9133e43bd6c51ecdecbcadfac5b51657393b6a7936c
    container_name: redis
    ports:
      - 6379:6379
    networks:
      - csclub
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - 27017:27017
    command:
      - --storageEngine=wiredTiger
    networks:
      - csclub
  payload:
    container_name: payload
    build:
      context: ../cms
      dockerfile: ../website/payload.Dockerfile
    restart: unless-stopped
    ports:
      - 4000:4000
    depends_on:
      - mongo
    environment:
      - PORT=4000
      - DATABASE_URI=mongodb://mongo/cms
      - PAYLOAD_SECRET=secret-32-chars-long-for-testing-purposes
      - FRONTEND_URL=http://127.0.0.1:3000
      - MEDIA_STORAGE_LOCATION=local
      - LOGIN_TYPE=email
      - ROOT_EMAIL=admin@admin.com
      - ROOT_PASS=password
      - CI=true
    networks:
      - csclub
  csclub-website:
    container_name: csclub-website
    build:
      context: .
      dockerfile: dev.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.dev.docker
    environment:
      - PUID=1000
      - PGID=1000
      - PORT=3000
    ports:
      - 3000:3000
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "CI=true pnpm install && if ! sqlite3 dev.sqlite '.tables' | grep -q members; then pnpm run db:push; fi && pnpm run dev"
    networks:
      - csclub

networks:
  csclub:
